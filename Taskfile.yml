version: '3'

tasks:
  lint:
    desc: Run every pre-commit hook against all files
    cmds:
      - pre-commit run --all-files

  fmt:
    desc: Auto-format Nix files (alejandra)
    cmds:
      - alejandra .

  fix:
    desc: Auto-fix common Nix issues (statix + deadnix; will modify files)
    cmds:
      - statix fix .
      - deadnix --edit .

  check:
    desc: Evaluate all flake outputs (nix flake check)
    cmds:
      - nix flake check

  contract:
    desc: Check the module contract (every modules/ file is exported from flake.nix, and vice-versa)
    cmds:
      - ./scripts/check-module-contract.sh

  new:module:
    desc: 'Scaffold a new shared home module from the skeleton: task new:module -- <name>'
    cmds:
      - |
        set -eu
        name="{{.CLI_ARGS}}"
        if [ -z "$name" ]; then
          echo "usage: task new:module -- <name>   (e.g. task new:module -- netbird-extra)" >&2
          exit 1
        fi
        dest="modules/home/${name}.nix"
        if [ -e "$dest" ]; then
          echo "refusing to overwrite existing $dest" >&2
          exit 1
        fi
        sed "s/myModule/${name}/g" templates/home-module/module.nix > "$dest"
        echo "created $dest"
        echo "next:"
        echo "  1. export it in flake.nix   ->  homeModules.${name} = ./$dest;"
        echo "  2. task contract && task fmt && task lint"

  update:sources:
    desc: Update every pinned upstream source (claude-code, copilot-cli, codex, terraform, _1password-{cli,gui}) via nvfetcher; writes _sources/generated.{nix,json}
    cmds:
      - nix run nixpkgs#nvfetcher --
      # Format nvfetcher's output so it passes the repo's alejandra check
      # (lint.yml runs `alejandra --check .` over everything).
      - nix run nixpkgs#alejandra -- _sources/generated.nix
      # nvfetcher writes generated.json without a trailing newline, but the
      # end-of-file-fixer pre-commit hook adds one — so every run otherwise
      # leaves a phantom one-line diff. Normalize here to keep the task stable.
      - |
        [ -n "$(tail -c1 _sources/generated.json)" ] && printf '\n' >> _sources/generated.json || true
