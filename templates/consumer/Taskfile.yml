version: '3'

# Consumer Taskfile template. Carries the blessed lint + nix-common pin-sync
# guardrails. Adapt the build/activate tasks to your host(s).

tasks:
  # ── build / activate (standalone home-manager) ───────────────────────────
  check:
    desc: Build the home config without activating
    cmds:
      # CHANGEME: match the homeConfigurations key in flake.nix.
      - nix --accept-flake-config build '.#homeConfigurations."user@hostname".activationPackage'

  switch:
    desc: Activate the home config (run ON the target host)
    cmds:
      # CHANGEME: match the homeConfigurations key in flake.nix.
      - nix --accept-flake-config run home-manager -- switch --flake '.#user@hostname'

  # ── lint / format ────────────────────────────────────────────────────────
  lint:
    desc: Run every pre-commit hook against all files
    cmds:
      - pre-commit run --all-files

  fmt:
    desc: Auto-format Nix files (alejandra)
    cmds:
      - alejandra .

  fix:
    desc: Auto-fix common Nix issues (statix + deadnix; will modify files)
    cmds:
      - statix fix .
      - deadnix --edit .

  # ── flake input updates ──────────────────────────────────────────────────
  # Naming: `update:<scope>` throughout; the `:commit` suffix is the same
  # update plus a scoped commit. `update:branch` is the one-shot wrapper.
  # Old names (`bump:common`, `flake:update`) are kept as aliases.
  update:common:
    aliases: [bump:common]
    desc: Update nix-common in flake.lock AND the ci.yml workflow pin (no commit)
    cmds:
      - nix --accept-flake-config flake update nix-common
      - nix --accept-flake-config run github:geoffdavis/nix-common#sync-pin

  update:common:commit:
    aliases: [bump:common:commit]
    desc: Update nix-common + sync ci.yml pin + commit (refuses on main/master/detached HEAD); commit body rolls up the nix-common changelog
    cmds:
      - task: _guard:committable-branch
      - |
        set -eu
        scratch=$(git rev-parse --git-path bump-common.old)
        rm -f "$scratch"
        old=$(nix --accept-flake-config run nixpkgs#jq -- -r '.nodes."nix-common".locked.rev' flake.lock)
        if [ -z "$old" ] || [ "$old" = "null" ]; then
          echo "update:common:commit: could not read nix-common rev from flake.lock" >&2
          exit 1
        fi
        printf '%s' "$old" > "$scratch"
      - task: update:common
      - |
        set -eu
        scratch=$(git rev-parse --git-path bump-common.old)
        old=$(cat "$scratch")
        rm -f "$scratch"
        new=$(nix --accept-flake-config run nixpkgs#jq -- -r '.nodes."nix-common".locked.rev' flake.lock)
        if [ -z "$new" ] || [ "$new" = "null" ]; then
          echo "update:common:commit: could not read nix-common rev from flake.lock post-bump" >&2
          exit 1
        fi
        if git diff --quiet HEAD -- flake.lock .github/workflows/ci.yml; then
          echo "update:common:commit: no flake.lock or ci.yml changes to commit"
          exit 0
        fi
        new_short=$(printf '%s' "$new" | cut -c1-7)
        if [ "$old" = "$new" ]; then
          git commit -m "chore: resync nix-common ci.yml pin to ${new_short}" \
            -- flake.lock .github/workflows/ci.yml
          exit 0
        fi
        old_short=$(printf '%s' "$old" | cut -c1-7)
        subject="chore: bump nix-common ${old_short}..${new_short}"
        # Roll the nix-common commit subjects in this range into the commit body
        # so the bump is self-documenting. Best-effort: needs gh + network.
        rollup=""
        if command -v gh >/dev/null 2>&1; then
          rollup=$(gh api "repos/geoffdavis/nix-common/compare/${old}...${new}" \
            --jq '.commits[] | "- " + (.commit.message | split("\n")[0])' 2>/dev/null || true)
        fi
        if [ -n "$rollup" ]; then
          printf '%s\n\n%s\n' "$subject" "$rollup" \
            | git commit -F - -- flake.lock .github/workflows/ci.yml
        else
          git commit -m "$subject" -- flake.lock .github/workflows/ci.yml
        fi

  _guard:committable-branch:
    internal: true
    desc: Refuse on main/master (branch protection) or detached HEAD (commits would orphan).
    cmds:
      - |
        set -eu
        branch=$(git rev-parse --abbrev-ref HEAD)
        case "$branch" in
          main|master)
            echo "Refusing to commit on $branch (branch protection requires PR). Switch to a feature branch first." >&2
            exit 1
            ;;
          HEAD)
            echo "Refusing to commit in detached HEAD state — commits would be orphaned. Check out a branch first." >&2
            exit 1
            ;;
        esac

  update:flake:
    aliases: [flake:update]
    desc: Update every flake input (also resyncs the ci.yml workflow pin)
    cmds:
      - nix --accept-flake-config flake update
      - nix --accept-flake-config run github:geoffdavis/nix-common#sync-pin

  update:flake:commit:
    desc: Update every flake input + sync ci.yml pin + commit (refuses on main/master/detached HEAD)
    cmds:
      - task: _guard:committable-branch
      - task: update:flake
      - |
        set -eu
        if git diff --quiet HEAD -- flake.lock .github/workflows/ci.yml; then
          echo "update:flake:commit: no flake.lock or ci.yml changes to commit"
          exit 0
        fi
        git commit -m "chore: update flake inputs" -- flake.lock .github/workflows/ci.yml

  update:branch:
    desc: "One-shot refresh on a fresh chore/flake-update-<ts> branch: update:common:commit then update:flake:commit. Run from a clean tree."
    cmds:
      - |
        set -eu
        if [ -n "$(git status --porcelain)" ]; then
          echo "update:branch: working tree not clean — commit or stash first." >&2
          exit 1
        fi
        branch="chore/flake-update-$(date +%Y%m%d-%H%M%S)"
        git switch -c "$branch"
        echo "update:branch: created and switched to $branch"
      - task: update:common:commit
      - task: update:flake:commit
      - |
        cur=$(git rev-parse --abbrev-ref HEAD)
        echo "update:branch: done on $cur. Push + open PR with:"
        echo "  git push -u origin \"$cur\" && gh pr create --fill"
