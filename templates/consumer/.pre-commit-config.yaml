# Install once per checkout: `pre-commit install`
# Run on everything: `pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Branch protection is on for main, so direct commits there would be
      # unpushable anyway — fail fast at commit time.
      - id: no-commit-to-branch
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: alejandra
        name: alejandra (nix formatter)
        entry: alejandra
        language: system
        types: [nix]

      - id: deadnix
        name: deadnix (unused nix code)
        entry: deadnix --fail
        language: system
        types: [nix]
        # CHANGEME: exclude generated files if any, e.g. a host's
        # hardware-configuration.nix:
        # exclude: ^hosts/.*/hardware-configuration\.nix$

      - id: statix
        name: statix (nix linter)
        entry: statix check
        language: system
        pass_filenames: false
        files: '\.nix$'
