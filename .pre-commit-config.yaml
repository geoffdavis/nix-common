# Install once per checkout: `pre-commit install`
# Run on everything: `pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Guard direct commits to main/master — branch protection is on, so
      # those commits would be unpushable anyway; fail fast at commit time.
      - id: no-commit-to-branch
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: alejandra
        name: alejandra (nix formatter)
        entry: alejandra
        language: system
        types: [nix]

      - id: deadnix
        name: deadnix (unused nix code)
        entry: deadnix --fail
        language: system
        types: [nix]
        # nvfetcher's generated.nix carries fetchgit/fetchFromGitHub/dockerTools
        # in its lambda signature even when no entry currently uses them; they
        # are needed for future entries, so don't trip on unused-pattern.
        exclude: ^_sources/

      - id: statix
        name: statix (nix linter)
        entry: statix check
        language: system
        pass_filenames: false
        files: '\.nix$'

      - id: nix-flake-check
        name: nix flake check
        entry: nix flake check
        language: system
        pass_filenames: false
        files: '\.(nix|lock)$'
