# Reusable: run claude-code-action for @claude mentions. Called by each repo's
# thin claude.yml wrapper so the pinned action SHA and the steps live in one
# place (bump here, not in five repos). Triggers stay in the callers.
name: claude-code-action (reusable)

on:
  workflow_call:
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude:
    # Self-hosted nix runner pool (no GitHub Actions minutes; the Claude API
    # is billed to CLAUDE_CODE_OAUTH_TOKEN, not GitHub).
    runs-on: [self-hosted, nix, x86_64-linux]
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      # The nixos/nix runner is non-FHS, so the generic bun + Claude Code the
      # action would download can't run. Build them (plus ripgrep + gh that
      # Claude Code shells out to) from the flake registry's current nixpkgs —
      # the same one the lint jobs use, already warm in the shared store and
      # patchelf'd for NixOS — and pass path_to_bun_executable /
      # path_to_claude_code_executable so the action skips its own installers.
      # git is already on PATH.
      - name: Provision bun + Claude Code + tools via nix
        id: nixtools
        shell: bash
        run: |
          set -euo pipefail
          bun=$(nix --accept-flake-config build --no-link --print-out-paths nixpkgs#bun)
          rg=$(nix --accept-flake-config build --no-link --print-out-paths nixpkgs#ripgrep)
          gh=$(nix --accept-flake-config build --no-link --print-out-paths nixpkgs#gh)
          claude=$(nix --accept-flake-config build --no-link --print-out-paths nixpkgs#claude-code)
          printf '%s\n' "$bun/bin" "$rg/bin" "$gh/bin" >> "$GITHUB_PATH"
          echo "bun=$bun/bin/bun" >> "$GITHUB_OUTPUT"
          echo "claude=$claude/bin/claude" >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@64de744025ca9e24df2b88204b4f1e968f39f009 # v1.0.139
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          path_to_bun_executable: ${{ steps.nixtools.outputs.bun }}
          path_to_claude_code_executable: ${{ steps.nixtools.outputs.claude }}
          additional_permissions: |
            actions: read
