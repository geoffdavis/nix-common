# Weekly auto-PR that bumps every pinned upstream source (claude-code,
# github-copilot-cli, codex, _1password-cli, _1password-gui) via nvfetcher.
# Replaces the per-tool update-ai-tools.yml — adding a new tracked package
# now means a new entry in /nvfetcher.toml, no workflow changes.
#
# Trigger an ad-hoc run from the Actions tab or via:
#   gh workflow run update-sources.yml
#
# Note: PRs opened by the default GITHUB_TOKEN do not trigger downstream
# workflows (GitHub anti-recursion feature), which leaves bump PRs BLOCKED
# when branch protection requires lint / flake-check. The BOT_PAT secret (a
# fine-grained PAT with contents + pull-requests write) makes the PR come
# from a user token so CI fires normally; if the secret is absent we fall
# back to GITHUB_TOKEN and the old close-and-reopen dance applies.

name: update-sources

on:
  workflow_dispatch:
  schedule:
    # Tuesdays at 07:00 UTC — a day after the flake-lock bump to avoid clashing.
    - cron: "0 7 * * 2"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Pinned to immutable commit SHAs; comments name the tag the SHA was
      # resolved from so a human or dependabot can bump intentionally.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Bump pinned sources
        run: nix run nixpkgs#nvfetcher --

      - name: Format nvfetcher output so lint.yml passes
        run: nix --accept-flake-config run nixpkgs#alejandra -- _sources/generated.nix

      - name: Validate generated sources eval cleanly
        run: nix --accept-flake-config flake check

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.BOT_PAT || github.token }}
          commit-message: "chore: bump pinned sources via nvfetcher"
          branch: chore/update-sources
          delete-branch: true
          title: "chore: bump pinned sources"
          add-paths: |
            _sources/generated.nix
            _sources/generated.json
          body: |
            Auto-bump of pinned upstream sources via nvfetcher
            (claude-code, github-copilot-cli, codex, _1password-cli, _1password-gui).

            Consumer repos pick this up on their next `task bump:common` run.
          labels: |
            dependencies
            automated
