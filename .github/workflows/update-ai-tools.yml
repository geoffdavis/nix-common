# Weekly auto-PR that bumps github-copilot-cli and claude-code to their
# latest upstream releases by updating the version pins in
# modules/home/ai-tools.nix.
#
# Once merged, consumer repos (nix-oceaneering, nix-personal, etc.) get the
# update on their next `task bump:common` run.
#
# Trigger an ad-hoc run from the Actions tab or via:
#   gh workflow run update-ai-tools.yml
#
# Note: PRs opened by GITHUB_TOKEN do not trigger downstream CI by default
# (GitHub security feature). The diff is small enough to eyeball-review.

name: update-ai-tools

on:
  workflow_dispatch:
  schedule:
    # Tuesdays at 07:00 UTC — a day after the flake-lock bump to avoid clashing.
    - cron: "0 7 * * 2"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update AI tool version pins
        run: ./scripts/update-ai-tools.sh

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: bump AI CLI tool versions"
          branch: chore/update-ai-tools
          delete-branch: true
          title: "chore: bump AI CLI tool versions"
          body: |
            Auto-bump of `github-copilot-cli` and `claude-code` to their latest
            upstream releases. Generated by the `update-ai-tools` workflow.

            Consumer repos pick this up on their next `task bump:common` run.
          labels: |
            dependencies
            automated
