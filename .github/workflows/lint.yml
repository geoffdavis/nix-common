# Reusable workflow: lint a Nix repo with alejandra, deadnix, and statix.
#
# Downstream repos call this via:
#
#   jobs:
#     lint:
#       uses: geoffdavis/nix-common/.github/workflows/lint.yml@main
#
# statix reads each repo's own statix.toml (so per-repo `ignore` / `disabled`
# settings apply automatically). Deadnix excludes are passed via input — used
# by nix-personal for the generated hardware-configuration.nix.

name: lint

on:
  workflow_call:
    inputs:
      deadnix-exclude:
        description: Newline-separated paths to skip in `deadnix --exclude`.
        type: string
        default: ""

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      # Pinned to immutable commit SHAs; comments name the tag the SHA
      # was resolved from so dependabot / a human can bump intentionally.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: alejandra --check
        run: nix --accept-flake-config run nixpkgs#alejandra -- --check .

      - name: deadnix
        env:
          EXCLUDES: ${{ inputs.deadnix-exclude }}
        run: |
          args=()
          while IFS= read -r path; do
            [ -n "$path" ] && args+=(--exclude "$path")
          done <<< "$EXCLUDES"
          nix --accept-flake-config run nixpkgs#deadnix -- --fail "${args[@]}" .

      - name: statix check
        run: nix --accept-flake-config run nixpkgs#statix -- check .
