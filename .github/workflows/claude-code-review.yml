name: Claude Code Review

on:
  pull_request:
    # Deliberately NOT on `synchronize`: re-reviewing on every push to an open
    # PR burned the bulk of the Claude minutes. Review fires on open / ready /
    # reopen; request a re-review on demand by mentioning @claude.
    types: [opened, ready_for_review, reopened]

# A newer event for the same PR cancels an in-flight review.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  issues: read
  id-token: write

jobs:
  claude-review:
    # Fork guard: only same-repo PRs. This job runs on a self-hosted runner
    # with CLAUDE_CODE_OAUTH_TOKEN (secrets: inherit), so a fork PR — were a
    # consumer repo ever made public — must never land on persistent infra.
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/claude-code-review-action.yml
    secrets: inherit
