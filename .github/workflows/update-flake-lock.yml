# Weekly auto-PR that runs `nix flake update` and opens a pull request.
# Trigger an ad-hoc bump from the Actions tab or via:
#   gh workflow run update-flake-lock.yml
#
# Note: PRs opened by the default GITHUB_TOKEN do not trigger downstream
# workflows (GitHub anti-recursion feature), which leaves bump PRs BLOCKED
# when branch protection requires lint / flake-check. The BOT_PAT secret (a
# fine-grained PAT with contents + pull-requests write) makes the PR come
# from a user token so CI fires normally; if the secret is absent we fall
# back to GITHUB_TOKEN and the old close-and-reopen dance applies.

name: update-flake-lock

on:
  workflow_dispatch:
  schedule:
    # Mondays at 07:00 UTC — fresh PR at start of week.
    - cron: "0 7 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    # Self-hosted nix runner pool; Nix already present (no installer step).
    runs-on: [self-hosted, nix, x86_64-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@main
        with:
          token: ${{ secrets.BOT_PAT || github.token }}
          pr-labels: |
            dependencies
            automated
